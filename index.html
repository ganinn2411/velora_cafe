<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA Coffee — POS Sistemi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="lock-screen" id="lockScreen">
    <div class="lock-bg-orb lock-orb1"></div>
    <div class="lock-bg-orb lock-orb2"></div>
    <div class="lock-card">
      <div class="lock-logo"><span class="lock-logo-letter">A</span></div>
      <h1 class="lock-title">AURA</h1>
      <p class="lock-subtitle">Coffee & Kitchen POS</p>
      
      <div class="lock-wrapper" style="width: 100%; margin-top: 20px;">
        <label class="form-label" style="text-align: center; display: block;">Personel Seçiniz</label>
        <select class="form-input" id="staffSelect" style="margin-bottom: 15px; text-align: center; text-align-last: center;">
          <option value="Barista Efe">Barista Efe (PIN: 1111)</option>
          <option value="Barista Ayşe">Barista Ayşe (PIN: 2222)</option>
          <option value="Kasiyer Selin">Barista Selin (PIN: 3333)</option>
          <option value="Müdür Kerem">Müdür Kerem [Admin] (PIN: 0000)</option>
        </select>
        
        <label class="form-label" style="text-align: center; display: block;">4 Haneli Şifre</label>
        <input type="password" id="staffPin" class="form-input" placeholder="••••" maxlength="4" style="text-align:center; font-size: 24px; letter-spacing: 8px; margin-bottom: 20px;" />
        
        <button class="modal-btn accent" onclick="loginWithPin()" style="width:100%; justify-content:center; padding:14px;">
          <i class="fa-solid fa-lock-open"></i> Giriş Yap
        </button>
      </div>
    </div>
  </div>

  <div class="app" id="app" style="display:none">

    <aside class="sidebar">
      <div class="sidebar-logo">A</div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" id="nav-pos" onclick="switchView('pos', this)">
          <i class="fa-solid fa-mug-hot"></i>
          <span class="nav-label">Sipariş</span>
        </button>
        <button class="nav-btn" id="nav-tables" onclick="switchView('tables', this)">
          <i class="fa-solid fa-table-cells"></i>
          <span class="nav-label">Masalar</span>
        </button>
        <button class="nav-btn" id="nav-reports" onclick="switchView('reports', this)">
          <i class="fa-solid fa-chart-line"></i>
          <span class="nav-label">Raporlar</span>
        </button>
        <button class="nav-btn" id="nav-menu-manage" onclick="switchView('menu-manage', this)">
          <i class="fa-solid fa-sliders"></i>
          <span class="nav-label">Menü</span>
        </button>
      </nav>
      <div class="sidebar-bottom">
        <div class="staff-pill">
          <span class="staff-pill-avatar" id="staffAvatar">E</span>
          <div class="staff-pill-info">
            <span class="staff-pill-name" id="staffName">Barista Efe</span>
            <span class="staff-pill-role" id="staffRole">Barista</span>
          </div>
        </div>
        <button class="nav-btn" onclick="lockApp()" title="Çıkış Yap" style="height:45px; aspect-ratio:1;">
          <i class="fa-solid fa-arrow-right-from-bracket" style="color:var(--red)"></i>
        </button>
      </div>
    </aside>

    <div class="view" id="view-pos">
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-title">Sipariş Ekranı</div>
          <div class="topbar-meta" id="topbarMeta">—</div>
        </div>
        <div class="topbar-center">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" class="search-input" placeholder="Ürün veya kategori ara..." id="searchInput" oninput="filterProducts(this.value)" />
          </div>
        </div>
        <div class="topbar-right">
          <button class="topbar-btn" onclick="switchView('tables', document.getElementById('nav-tables'))">
            <i class="fa-solid fa-chair" style="color:var(--accent)"></i>
            <span id="activeTableLabel" style="font-weight:600;">Masa Seçilmedi</span>
          </button>
          <div class="topbar-time" id="topbarTime">00:00</div>
        </div>
      </header>
